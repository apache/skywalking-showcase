apiVersion: batch/v1
kind: Job
metadata:
  name: "demo-oap-init"
  labels:
    app: demo
    chart: skywalking-0.0.0-9a97f2d6f0291a580b00f13ddcc1a03079a23b23
    component: "demo-job"
    heritage: Helm
    release: demo
  annotations:
    "helm.sh/hook": post-install,post-upgrade,post-rollback
    "helm.sh/hook-weight": "1"
spec:
  template:
    metadata:
      name: "demo-oap-init"
      labels:
        app: demo
        component: "demo-job"
        release: demo
    spec:
      serviceAccountName: demo-oap
      restartPolicy: Never
      initContainers:
      
      - name: wait-for-banyandb
        image: curlimages/curl
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'for i in $(seq 1 60); do curl -k demo-banyandb-http:17913/api/healthz && exit 0 || sleep 5; done; exit 1']
      containers:
      - name: oap
        image: ghcr.io/apache/skywalking/oap:53cc332752d5b5aa84a0eddf66ccd2a5c1b7d316
        imagePullPolicy: IfNotPresent
        env:
        - name: JAVA_OPTS
          value: "-Xmx2g -Xms2g -Dmode=init"
        - name: SW_STORAGE
          value: banyandb
        - name: SW_STORAGE_BANYANDB_TARGETS
          value: "demo-banyandb-grpc:17912"
        - name: K8S_SERVICE_NAME_RULE
          value: "mesh-svr::${service.metadata.name}.${service.metadata.namespace}"
        - name: SW_AI_PIPELINE_URI_RECOGNITION_SERVER_PORT
          value: "17128"
        - name: SW_CONFIGURATION
          value: "k8s-configmap"
        - name: SW_CORE_ENABLE_ENDPOINT_NAME_GROUPING_BY_OPENAPI
          value: "false"
        - name: SW_CORE_MAX_HTTP_URIS_NUMBER_PER_SVR
          value: "3000"
        - name: SW_ENABLE_ON_DEMAND_POD_LOG
          value: "true"
        - name: SW_ENABLE_UPDATE_UI_TEMPLATE
          value: "false"
