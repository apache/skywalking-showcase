apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui
  labels:
    app: demo
    chart: skywalking-0.0.0-9a97f2d6f0291a580b00f13ddcc1a03079a23b23
    component: "ui"
    heritage: Helm
    release: demo
spec:
  replicas: 1
  # Horizon UI's BFF holds the session table in memory. Recreate (not
  # RollingUpdate) avoids the brief window of two pods serving traffic with
  # disjoint session state.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: demo
      component: "ui"
      release: demo
  template:
    metadata:
      labels:
        app: demo
        component: "ui"
        release: demo
      annotations:
        # Roll the pod when horizon.yaml changes — ConfigMap subPath mounts
        # don't auto-update at runtime.
        checksum/config: 1eb3c4604c23d7089990e07f63c35a1bd18d29d41dc6efec7e6b481bc98b3145
    spec:
      securityContext:
        fsGroup: 101

      affinity:
      containers:
      - name: ui
        image: ghcr.io/apache/skywalking-horizon-ui:b94cdf3c5e268813eae45b50907490f38759c14b
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: page
        livenessProbe:
          initialDelaySeconds: 30
          periodSeconds: 20
          tcpSocket:
            port: 8081
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /api/auth/health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: horizon-config
          mountPath: /app/horizon.yaml
          subPath: horizon.yaml
          readOnly: true
        - name: horizon-data
          mountPath: /data
      volumes:
      - name: horizon-config
        configMap:
          name: demo-ui
          items:
          - key: horizon.yaml
            path: horizon.yaml
      - name: horizon-data
        emptyDir: {}
