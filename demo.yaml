apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: demo
    chart: skywalking-0.0.0-9a97f2d6f0291a580b00f13ddcc1a03079a23b23
    component: "oap"
    heritage: Helm
    release: demo
  name: demo-oap
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
      component: "oap"
      release: demo
  template:
    metadata:
      labels:
        app: demo
        component: "oap"
        release: demo
    spec:
      serviceAccountName: demo-oap
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: "demo"
                  release: "demo"
                  component: "oap"
      initContainers:
      
      - name: wait-for-banyandb
        image: curlimages/curl
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'for i in $(seq 1 60); do curl -k demo-banyandb-http:17913/api/healthz && exit 0 || sleep 5; done; exit 1']
      containers:
      - name: oap
        image: ghcr.io/apache/skywalking/oap:53cc332752d5b5aa84a0eddf66ccd2a5c1b7d316
        imagePullPolicy: IfNotPresent
        livenessProbe:
          tcpSocket:
            port: 12800
          initialDelaySeconds: 5
          periodSeconds: 10
        startupProbe:
          failureThreshold: 10
          initialDelaySeconds: 120
          periodSeconds: 10
          tcpSocket:
            port: 12800

        readinessProbe:
          tcpSocket:
            port: 12800
          initialDelaySeconds: 5
          periodSeconds: 10
        ports:
        - containerPort: 17128
          name: admin
        - containerPort: 11800
          name: grpc
        - containerPort: 3100
          name: logql
        - containerPort: 1234
          name: metrics
        - containerPort: 9090
          name: promql
        - containerPort: 12800
          name: rest
        - containerPort: 3200
          name: traceql
        - containerPort: 9412
          name: zipkin-query
        - containerPort: 9411
          name: zipkin-receiver
        env:
        - name: SW_RECEIVER_ZIPKIN
          value: default
        - name: SW_RECEIVER_ZIPKIN_REST_PORT
          value: "9411"
        - name: SW_QUERY_ZIPKIN
          value: default
        - name: SW_QUERY_ZIPKIN_REST_PORT
          value: "9412"
        - name: JAVA_OPTS
          value: "-Dmode=no-init -Xmx2g -Xms2g"
        - name: SW_CLUSTER
          value: kubernetes
        - name: SW_CLUSTER_K8S_NAMESPACE
          value: "skywalking-showcase"
        - name: SW_CLUSTER_K8S_LABEL
          value: "app=demo,release=demo,component=oap"
        - name: SKYWALKING_COLLECTOR_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: SW_STORAGE
          value: banyandb
        - name: SW_STORAGE_BANYANDB_TARGETS
          value: "demo-banyandb-grpc:17912"
        - name: K8S_SERVICE_NAME_RULE
          value: "mesh-svr::${service.metadata.name}.${service.metadata.namespace}"
        - name: SW_AI_PIPELINE_URI_RECOGNITION_SERVER_PORT
          value: "17128"
        - name: SW_CONFIGURATION
          value: "k8s-configmap"
        - name: SW_CORE_ENABLE_ENDPOINT_NAME_GROUPING_BY_OPENAPI
          value: "false"
        - name: SW_CORE_MAX_HTTP_URIS_NUMBER_PER_SVR
          value: "3000"
        - name: SW_ENABLE_ON_DEMAND_POD_LOG
          value: "true"
        - name: SW_ENABLE_UPDATE_UI_TEMPLATE
          value: "false"
        - name: SW_ENVOY_METRIC_ALS_HTTP_ANALYSIS
          value: "mx-mesh,persistence"
        - name: SW_ENVOY_METRIC_ALS_TCP_ANALYSIS
          value: "mx-mesh"
        - name: SW_HEALTH_CHECKER
          value: "default"
        - name: SW_METER_ANALYZER_ACTIVE_FILES
          value: "datasource,threadpool,satellite,network-profiling,go-runtime,python-runtime,spring-micrometer,continuous-profiling,java-agent,go-agent"
