data:
 alarm-settings.yml: |
    rules:
      service_resp_time_rule:
        # 20ms is just for demo
        expression: sum(service_resp_time > 20) >= 1 
        period: 5
        tags:
          level: WARNING
        message: Response time of service {name} is more than 20ms.
    
 cilium-rules-exclude.yaml: |
