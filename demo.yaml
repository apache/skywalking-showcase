              value: "15s"
            - name: BYDB_NODE_DISCOVERY_GRPC_TIMEOUT
              value: "5s"
            - name: GOMEMLIMIT
              value: "6GiB"
           
          args:
            - data 
          ports:
            - containerPort: 17912
              name: grpc
            - containerPort: 17913
              name: http-healthz
            - containerPort: 6060
              name: pprof
            - containerPort: 2121
              name: observability
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 17913
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 30
