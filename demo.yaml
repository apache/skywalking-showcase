        sidecar.skywalking.apache.org/initcontainer.Image: "ghcr.io/apache/skywalking-java/skywalking-java:26ef911aea908759795bb6f5f2f6be56370d30cc-java8"
    spec:
      containers:
        - name: gateway
          image: "ghcr.io/apache/skywalking-showcase/gateway-service:98c98f9"
          imagePullPolicy: IfNotPresent
