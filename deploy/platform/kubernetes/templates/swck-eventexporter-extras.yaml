#
# Workaround for a gap in apache/skywalking-helm: the chart at the version
# pinned in Chart.yaml does not ship the EventExporter CRD or RBAC, but the
# pinned swck-operator image (Makefile.in: SWCK_OPERATOR_IMAGE_TAG) registers
# an EventExporterReconciler unconditionally. Without these, the operator
# fails cache sync and crashlooops, which takes its mutating webhook down
# and blocks pod creation in sample-services.
#
# Remove this file once apache/skywalking-helm ships EventExporter natively.
{{- if .Values.features.javaAgentInjector.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: eventexporters.operator.skywalking.apache.org
spec:
  group: operator.skywalking.apache.org
  names:
    kind: EventExporter
    listKind: EventExporterList
    plural: eventexporters
    singular: eventexporter
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The version
      jsonPath: .spec.version
      name: Version
      priority: 1
      type: string
    - jsonPath: .spec.image
      name: Image
      priority: 1
      type: string
    - description: The number of expected instances
      jsonPath: .spec.instances
      name: Instances
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: EventExporter is the Schema for the eventexporters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EventExporterSpec defines the desired state of EventExporter
            properties:
              config:
                description: Config of filters and exporters
                type: string
              image:
                description: Image is the event exporter Docker image to deploy.
                type: string
              replicas:
                description: Replicas is the number of event exporter pods
                format: int32
                type: integer
              version:
                description: Version of EventExporter.
                type: string
            required:
            - replicas
            - version
            type: object
          status:
            description: EventExporterStatus defines the observed state of EventExporter
            properties:
              availableReplicas:
                description: Total number of available pods targeted by this deployment.
                format: int32
                type: integer
              conditions:
                description: Represents the latest available observations of the underlying
                  deployment's current state.
                items:
                  description: DeploymentCondition describes the state of a deployment
                    at a certain point.
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    lastUpdateTime:
                      description: The last time this condition was updated.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type of deployment condition.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              configMapName:
                description: Name of the configMap.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.swck.fullnameOverride }}-eventexporter-extras
rules:
- apiGroups:
  - operator.skywalking.apache.org
  resources:
  - eventexporters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - operator.skywalking.apache.org
  resources:
  - eventexporters/finalizers
  verbs:
  - update
- apiGroups:
  - operator.skywalking.apache.org
  resources:
  - eventexporters/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.swck.fullnameOverride }}-eventexporter-extras
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.swck.fullnameOverride }}-eventexporter-extras
subjects:
- kind: ServiceAccount
  name: {{ .Values.swck.fullnameOverride }}-controller-manager
  namespace: {{ .Release.Namespace }}
{{- end }}